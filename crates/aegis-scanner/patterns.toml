# Aegis built-in pattern database
# Each [[patterns]] entry is compiled into the binary at build time.
# Fields:
#   id            — unique identifier, e.g. "FS-001"
#   category      — Filesystem | Git | Database | Cloud | Docker | Process | Package
#   risk          — Safe | Warn | Danger | Block
#   pattern       — regex matched against the full command string
#   description   — human-readable explanation shown in the TUI dialog
#   safe_alt      — optional safer alternative (shown when available)
#   justification — optional human-readable explanation of why the rule is risky

# ─── Filesystem ──────────────────────────────────────────────────────────────

[[patterns]]
id = "FS-001"
category = "Filesystem"
risk = "Danger"
pattern = '\brm\s+(?:-[A-Za-z]*[rR][A-Za-z]*f[A-Za-z]*|-[A-Za-z]*f[A-Za-z]*[rR][A-Za-z]*|(?:-[A-Za-z]*[rR][A-Za-z]*|--recursive)(?:\s+(?:--|-{1,2}[A-Za-z][A-Za-z0-9-]*))*\s+(?:-[A-Za-z]*f[A-Za-z]*|--force)|(?:-[A-Za-z]*f[A-Za-z]*|--force)(?:\s+(?:--|-{1,2}[A-Za-z][A-Za-z0-9-]*))*\s+(?:-[A-Za-z]*[rR][A-Za-z]*|--recursive))'
description = "Recursive force delete — permanently removes files and directories with no recovery path"
safe_alt = "Move to trash: 'trash <path>' or 'mv <path> /tmp/backup-$(date +%s)'"
justification = "This permanently deletes data. There is no undo. Confirm you have backups or that the data is truly disposable."

[[patterns]]
id = "FS-002"
category = "Filesystem"
risk = "Danger"
pattern = 'find\s+.+(-delete|-exec\s+rm)'
description = "find with -delete or -exec rm — can silently delete large file trees"
safe_alt = "Dry-run first: 'find <args>' without -delete to preview matched files"
justification = "find -delete executes immediately and silently. A typo in the path pattern can wipe the wrong directory tree without confirmation."

[[patterns]]
id = "FS-003"
category = "Filesystem"
risk = "Danger"
pattern = 'dd\s+.*(of=/dev/[a-zA-Z]|of=/dev/null)'
description = "dd writing to a block device or /dev/null — can overwrite entire disks or destroy data"
safe_alt = "Test with a temp file target: 'dd ... of=/tmp/test.img' before targeting real devices"
justification = "dd is unforgiving: a single typo in the output path can overwrite an entire disk. It provides no confirmation prompt and writes raw bytes directly."

[[patterns]]
id = "FS-004"
category = "Filesystem"
risk = "Danger"
pattern = 'shred\s+'
description = "shred — overwrites files to prevent recovery; data is irrecoverable"
safe_alt = "Use 'trash <file>' if you only want to remove without secure erase"
justification = "shred overwrites file contents to make recovery impossible. Once run, the original data is gone forever with no recovery path."

[[patterns]]
id = "FS-005"
category = "Filesystem"
risk = "Warn"
pattern = 'truncate\s+.*-s\s*0'
description = "truncate to zero bytes — empties a file's content without removing the inode"
safe_alt = "Back up the file first: 'cp <file> <file>.bak && truncate -s 0 <file>'"
justification = "truncate -s 0 instantly empties a file's contents without creating a backup. The data is lost immediately and cannot be recovered."

[[patterns]]
id = "FS-006"
category = "Filesystem"
risk = "Block"
pattern = 'mkfs(\.[a-z0-9]+)?\s+'
description = "mkfs — formats a filesystem, permanently destroying all data on the target device"
safe_alt = "Verify the target device carefully with 'lsblk' before formatting"
justification = "Formatting a filesystem is instantaneous and irreversible. Double-check the device path to avoid wiping the wrong disk."

[[patterns]]
id = "FS-007"
category = "Filesystem"
risk = "Warn"
pattern = 'chmod\s+(-R\s+)?[0-7]*7[0-7][0-7]\s+'
description = "chmod with world-writable bits (x77) — makes files writable by any user on the system"
safe_alt = "Use the minimum required permissions; world-writable is rarely correct"
justification = "World-writable permissions (777) allow any user or process to modify the file. This is a common source of privilege escalation and unauthorized access."

[[patterns]]
id = "FS-008"
category = "Filesystem"
risk = "Warn"
pattern = 'chown\s+-R\s+'
description = "Recursive chown — changes ownership of an entire directory tree"
safe_alt = "Confirm the target path is correct before changing ownership recursively"
justification = "Recursive chown touches every file and directory under the target. A typo can change system file ownership and break services that rely on specific owners."

[[patterns]]
id = "FS-009"
category = "Filesystem"
risk = "Block"
pattern = '>\s*/dev/sd[a-z]'
description = "Redirect output to a raw block device — overwrites disk data directly"
safe_alt = "Use a file path, not a raw device, as the redirect target"
justification = "Redirecting output to a raw block device writes directly to disk sectors, bypassing the filesystem. This destroys the partition table and all data instantly."

[[patterns]]
id = "FS-010"
category = "Filesystem"
risk = "Danger"
pattern = 'mv\s+.*/etc(/|\s)'
description = "Moving /etc or its contents — can break system configuration and make the system unbootable"
safe_alt = "Copy and modify files under /etc instead of moving them"
justification = "/etc contains critical system configuration. Moving files out of it can cause boot failures, service crashes, and loss of network or storage configuration."

# FS-013/FS-014 are match-anywhere regexes (not token-prefix rules): the danger
# is a redirect operator + target path that can appear anywhere in the command
# (e.g. `echo k >> ~/.ssh/authorized_keys`), never as the leading program token
# (ADR-015 / FS-009 shape). Each has a clean extractable keyword so the
# quick-scan gate stays on the keyword path (no has_uncovered regression).

[[patterns]]
id = "FS-013"
category = "Filesystem"
risk = "Danger"
# Two top-level alternatives, so keyword extraction yields a needle per branch:
#  1. `>+ … authorized_keys` — redirect form. Leading `>+` (not a literal `>>`)
#     is deliberate: a literal `>>` would become the Aho-Corasick keyword and
#     gate on every append redirect. With `>+`, extraction falls through to the
#     embedded `authorized_keys` literal. Matches `>` (truncate/lockout) and
#     `>>` (append/backdoor).
#  2. `tee … authorized_keys` — the canonical no-redirect backdoor idiom
#     (`echo key | tee -a ~/.ssh/authorized_keys`, often `| sudo tee -a`). The
#     `(?:-\S+\s+)*` lets flags like `-a` sit between `tee` and the target. This
#     branch's keyword is `tee` (cf. the existing short `dd`/`rm` needles); it is
#     redundant in practice because the matched command always also contains
#     `authorized_keys`.
pattern = '>+\s*\S*authorized_keys|tee\s+(?:-\S+\s+)*\S*authorized_keys'
description = "Write into ~/.ssh/authorized_keys (via redirect or tee) — appends an SSH backdoor key or truncates the file, locking you out"
safe_alt = "Use 'ssh-copy-id' to add a key safely, or edit the file with a reviewed temp copy"
justification = "Writing to authorized_keys changes who can log in. An append (redirect '>>' or 'tee -a') installs a persistent backdoor; a truncate removes every authorized key and can lock you out of the host."

[[patterns]]
id = "FS-014"
category = "Filesystem"
risk = "Warn"
# Single-`>` clobber only — an append (`>>`) is recoverable and must NOT fire.
# The Rust regex crate has no lookbehind, so each single `>` is isolated with
# the `(^|[^>])>[^>]` guard. The alternation is top-level *per filename* so
# keyword extraction yields one needle per rc file (every rc file gates);
# a single inline `(bashrc|zshrc|…)` group would gate on `bashrc` only.
pattern = '(^|[^>])>[^>]\s*\S*\.bashrc|(^|[^>])>[^>]\s*\S*\.zshrc|(^|[^>])>[^>]\s*\S*\.bash_profile|(^|[^>])>[^>]\s*\S*\.zprofile|(^|[^>])>[^>]\s*\S*\.profile|(^|[^>])>[^>]\s*\S*\.zshenv|(^|[^>])>[^>]\s*\S*\.bash_login'
description = "Truncating redirect (>) over a shell-rc file — overwrites your shell startup config in one step"
safe_alt = "Append instead of clobber ('>>'), or back up first: 'cp ~/.bashrc ~/.bashrc.bak'"
justification = "A single '>' replaces the entire shell-rc file with the redirected content, discarding your existing aliases, exports, and PATH setup. The previous contents are gone unless backed up."

# ─── Git ─────────────────────────────────────────────────────────────────────
# NOTE: GIT-001..GIT-008 are now defined as token-prefix rules in
# builtin_prefix_rules() in crates/aegis-scanner/src/patterns.rs.
# They are removed from this regex file to demonstrate the regex→token migration.

# ─── Database ────────────────────────────────────────────────────────────────
#
# DB-006 (Redis FLUSHALL/FLUSHDB) is a token-prefix rule defined in
# builtin_prefix_rules() in crates/aegis-scanner/src/patterns.rs.
# The destructive-SQL rules below (DB-001/002/007/008) are regex patterns that
# match the normalized command ANYWHERE: SQL verbs arrive embedded in
# `psql -c` / `mysql -e` / `--command=` / `--execute` / heredoc / stdin, never
# as a leading program token, so a token-prefix rule keyed on the effective
# program would miss them (ADR-015). They are `\b`-anchored with a mandatory
# `\s+` between verb and object to stay narrow.

[[patterns]]
id = "DB-001"
category = "Database"
risk = "Danger"
pattern = '\bdrop\s+table\b'
description = "DROP TABLE — permanently deletes a database table and all its data"
safe_alt = "Back up the table first: 'CREATE TABLE backup AS SELECT * FROM <table>'"
justification = "Destroys the table and all data. In most engines this is immediate and irreversible without a backup."

[[patterns]]
id = "DB-002"
category = "Database"
risk = "Danger"
pattern = '\bdrop\s+database\b'
description = "DROP DATABASE — permanently destroys an entire database and all its contents"
safe_alt = "Take a full backup with pg_dump / mysqldump before dropping"
justification = "Destroys the entire database. This removes all schemas, tables, indexes, and data permanently."

[[patterns]]
id = "DB-003"
category = "Database"
risk = "Danger"
pattern = 'DELETE\s+FROM\s+\w+\s*;'
description = "DELETE FROM without a WHERE clause — deletes every row in the table"
safe_alt = "Always add a WHERE clause; test with SELECT first to confirm affected rows"
justification = "Omitting WHERE turns a targeted delete into a table wipe. In production this usually requires a restore from backup."

[[patterns]]
id = "DB-004"
category = "Database"
risk = "Danger"
pattern = 'truncate\s+table'
description = "TRUNCATE TABLE — removes all rows from a table without logging individual row deletions; data is unrecoverable"
safe_alt = "Use DELETE with a WHERE clause if you need to remove specific rows; for full removal, ensure backups exist"
justification = "TRUNCATE is a metadata operation that drops all data pages instantly. Unlike DELETE, it does not log individual row removals, making recovery impossible without a backup."

[[patterns]]
id = "DB-005"
category = "Database"
risk = "Danger"
pattern = '--accept-data-loss'
description = "--accept-data-loss flag — explicitly acknowledges potential data loss in MongoDB/Atlas operations"
safe_alt = "Investigate why the flag is needed; prefer replica set elections without data loss"
justification = "This flag tells the database to proceed even if data loss is expected. It should only be used after understanding exactly what data will be lost and why."

[[patterns]]
id = "DB-007"
category = "Database"
risk = "Danger"
pattern = '\bdrop\s+schema\b'
description = "DROP SCHEMA — deletes an entire schema including all objects contained within it"
safe_alt = "Back up the schema first and verify all dependent objects are accounted for"
justification = "Removes a schema and every object inside it. Dependencies on those objects will break."

[[patterns]]
id = "DB-008"
category = "Database"
risk = "Warn"
pattern = '\balter\s+table\s+.+?\s+drop\s+column\b'
description = "ALTER TABLE DROP COLUMN — removes a column and all its data permanently"
safe_alt = "Add a NOT NULL DEFAULT before removing to safely migrate dependent queries first"
justification = "Removes a column and all its data permanently. Dependent views, triggers, and queries will fail."

# ─── Cloud ───────────────────────────────────────────────────────────────────
#
# CL-001..CL-010 are now token-prefix rules in builtin_prefix_rules().
# No regex patterns remain in this category.

# ─── Docker ──────────────────────────────────────────────────────────────────
#
# DK-001..DK-006 are now token-prefix rules in builtin_prefix_rules().
# No regex patterns remain in this category.

# ─── Process ─────────────────────────────────────────────────────────────────
#
# PS-001, PS-002, PS-005 are now token-prefix rules in builtin_prefix_rules().
# PS-003, PS-004, PS-006, PS-007 remain regex patterns (require arbitrary gaps,
# alternation, or negative lookahead that prefix rules cannot express).

[[patterns]]
id = "PS-003"
category = "Process"
risk = "Warn"
pattern = 'killall\s+'
description = "killall — kills all processes with a given name; can inadvertently terminate critical daemons"
safe_alt = "Use 'kill <specific-pid>' after 'pgrep <name>' to target only the intended process"
justification = "Process names can match multiple services. Accidentally killing a daemon can crash dependent systems or drop active connections."

[[patterns]]
id = "PS-004"
category = "Process"
risk = "Block"
pattern = ':\(\)\{.*:\|:.*\}'
description = "Fork bomb — exhausts process table by spawning processes recursively, causing system DoS"
safe_alt = "There is no safe version of a fork bomb; this command must not be run"
justification = "A fork bomb consumes all process slots and file descriptors, rendering the system unusable and often requiring a hard reboot."

[[patterns]]
id = "PS-006"
category = "Process"
risk = "Block"
pattern = '(sudo\s+)?\brm\s+(?:-[A-Za-z]*[rR][A-Za-z]*f[A-Za-z]*|-[A-Za-z]*f[A-Za-z]*[rR][A-Za-z]*|(?:-[A-Za-z]*[rR][A-Za-z]*|--recursive)(?:\s+(?:--|-{1,2}[A-Za-z][A-Za-z0-9-]*))*\s+(?:-[A-Za-z]*f[A-Za-z]*|--force)|(?:-[A-Za-z]*f[A-Za-z]*|--force)(?:\s+(?:--|-{1,2}[A-Za-z][A-Za-z0-9-]*))*\s+(?:-[A-Za-z]*[rR][A-Za-z]*|--recursive))(?:\s+(?:--|-{1,2}[A-Za-z][A-Za-z0-9-]*))*\s+/(\s|$)'
description = "rm -rf / — deletes the entire root filesystem; unrecoverable system destruction"
safe_alt = "There is no safe alternative; this command must not be run"
justification = "This command recursively and forcefully deletes everything on the root filesystem. It will brick the machine immediately and permanently."

[[patterns]]
id = "PS-007"
category = "Process"
risk = "Block"
pattern = '(sudo\s+)?umount\s+(-f\s+)?/(\s|$)'
description = "umount / — unmounts the root filesystem, causing an immediate system crash"
safe_alt = "Use 'umount <specific-mountpoint>' to unmount only the intended filesystem"
justification = "The root filesystem is required for the kernel and every running process. Unmounting it causes an immediate kernel panic and system crash."

# ─── Package ─────────────────────────────────────────────────────────────────
#
# PKG-005 is now a token-prefix rule in builtin_prefix_rules().
# PKG-001..PKG-004 remain regex patterns (require pipe or process substitution).

[[patterns]]
id = "PKG-001"
category = "Package"
risk = "Danger"
pattern = 'curl\s+.+\|\s*(ba)?sh'
description = "curl | sh/bash — downloads and executes a remote script without any integrity verification"
safe_alt = "Download first: 'curl -o install.sh <url>' then inspect and run 'bash install.sh'"
justification = "curl | sh executes remote code immediately without giving you a chance to review it. A compromised server or MITM can inject arbitrary commands into your shell."

[[patterns]]
id = "PKG-002"
category = "Package"
risk = "Danger"
pattern = 'wget\s+.+\|\s*(ba)?sh'
description = "wget | sh/bash — downloads and executes a remote script without any integrity verification"
safe_alt = "Download first: 'wget -O install.sh <url>' then inspect and run 'bash install.sh'"
justification = "wget | sh executes remote code immediately without giving you a chance to review it. A compromised server or MITM can inject arbitrary commands into your shell."

[[patterns]]
id = "PKG-003"
category = "Package"
risk = "Danger"
pattern = 'bash\s+<\(\s*curl'
description = "bash <(curl ...) — process substitution that downloads and executes a remote script"
safe_alt = "Download the script first, review its content, then execute if trusted"
justification = "Process substitution runs downloaded code directly in the shell without writing to disk first. There is no opportunity to inspect the payload before execution."

[[patterns]]
id = "PKG-004"
category = "Package"
risk = "Danger"
pattern = 'eval\s+.*\$\(\s*(curl|wget)'
description = "eval $(curl/wget ...) — evaluates the output of a remote download as shell code"
safe_alt = "Never eval untrusted remote content; download, inspect, then run explicitly"
justification = "eval executes the downloaded content as shell code. A compromised download source can run arbitrary commands with your user's privileges."

# ─── Indirect Execution ───────────────────────────────────────────────────────

[[patterns]]
id = "EXEC-001"
category = "Process"
risk = "Danger"
pattern = 'echo\s+.+\|\s*(ba)?sh\b'
description = "echo payload | sh/bash — executes an inline string as shell code, bypassing script file inspection"
safe_alt = "Write the command to a script file, review it, then execute explicitly"
justification = "Piping echo output into a shell executes code that was assembled inline. This bypasses file-based review and can hide malicious payloads in environment variables or command substitutions."

[[patterns]]
id = "EXEC-002"
category = "Process"
risk = "Warn"
pattern = '^python[23]?\s+-[a-zA-Z]*c\b'
description = "python -c — executes an inline Python script; dangerous code inside may evade shell-level pattern scanning"
safe_alt = "Write the code to a .py file and run it: 'python3 script.py'"
justification = "Inline scripts embedded in -c arguments bypass shell-level scanning. Malicious filesystem or network operations hidden inside Python strings will not be caught by Aegis regex rules."

[[patterns]]
id = "EXEC-003"
category = "Process"
risk = "Warn"
pattern = '(node|nodejs)\s+-e\b'
description = "node -e — executes an inline Node.js snippet; dangerous code inside may evade shell-level pattern scanning"
safe_alt = "Write the code to a .js file and run it: 'node script.js'"
justification = "Inline snippets in -e arguments bypass shell-level scanning. Malicious filesystem or network operations hidden inside JavaScript strings will not be caught by Aegis regex rules."

[[patterns]]
id = "EXEC-004"
category = "Process"
risk = "Warn"
pattern = 'perl\s+-e\b'
description = "perl -e — executes an inline Perl script; dangerous code inside may evade shell-level pattern scanning"
safe_alt = "Write the code to a .pl file and run it: 'perl script.pl'"
justification = "Inline scripts in -e arguments bypass shell-level scanning. Malicious filesystem or network operations hidden inside Perl strings will not be caught by Aegis regex rules."

[[patterns]]
id = "EXEC-005"
category = "Process"
risk = "Warn"
pattern = '^eval\b'
description = "eval ... — executes shell code assembled at runtime; the final command may not be visible at intercept time"
safe_alt = "Avoid eval; pass explicit arguments or run a reviewed script file instead"
justification = "eval breaks static analysis. The actual command being executed is constructed dynamically and may contain hidden destructive operations injected via variables."

[[patterns]]
id = "EXEC-006"
category = "Process"
risk = "Warn"
pattern = '^bash\s+(?:--[a-z-]+\s+)*-[a-zA-Z]*c\b|^sh\s+(?:--[a-z-]+\s+)*-[a-zA-Z]*c\b|^dash\s+(?:--[a-z-]+\s+)*-[a-zA-Z]*c\b|^zsh\s+(?:--[a-z-]+\s+)*-[a-zA-Z]*c\b|^ksh\s+(?:--[a-z-]+\s+)*-[a-zA-Z]*c\b|^fish\s+(?:--[a-z-]+\s+)*-[a-zA-Z]*c\b'
description = "shell -c ... — executes a nested shell command string whose final behavior may differ from the visible outer command"
safe_alt = "Write the command to a reviewed script file or run the intended command directly without shell indirection"
justification = "The -c flag runs an arbitrary command string inside a new shell process. This can hide the real payload from quick visual inspection and may bypass command-level guards."

[[patterns]]
id = "EXEC-007"
category = "Process"
risk = "Warn"
pattern = 'eval\s+"?\$'
description = "eval \"$VAR\" — evaluates a variable's contents as shell code; the variable value cannot be scanned at intercept time"
safe_alt = "Avoid eval with variables; pass data as arguments or via a temporary script file"
justification = "Variable contents are invisible to static analysis. A malicious or unexpected value can inject arbitrary commands that execute with full shell privileges."

[[patterns]]
id = "EXEC-008"
category = "Process"
risk = "Warn"
pattern = '(ba)?sh\s+<\('
description = "sh/bash <(...) — executes command output via process substitution as a script without writing to disk"
safe_alt = "Redirect the output to a file, inspect it, then execute: 'cmd > script.sh && bash script.sh'"
justification = "Process substitution feeds command output directly into the shell interpreter. The intermediate data is never written to disk, so there is no file to inspect before execution."

[[patterns]]
id = "EXEC-009"
category = "Process"
risk = "Warn"
pattern = 'source\s+<\('
description = "source <(...) — sources the output of a command directly into the shell without a file on disk"
safe_alt = "Redirect the output to a temp file, inspect it, then source explicitly: 'cmd > /tmp/init.sh && source /tmp/init.sh'"
justification = "Sourcing command output directly into the current shell executes it in the existing environment. Any malicious code gains immediate access to exported variables and functions."

[[patterns]]
id = "EXEC-010"
category = "Process"
risk = "Warn"
pattern = '^ruby\s+-e\b'
description = "ruby -e — executes an inline Ruby snippet; dangerous code inside may evade shell-level pattern scanning"
safe_alt = "Write the code to a .rb file and run it explicitly"
justification = "Inline Ruby in -e arguments bypasses shell-level scanning. Malicious filesystem or network operations hidden inside Ruby strings will not be caught by Aegis regex rules."

[[patterns]]
id = "EXEC-011"
category = "Process"
risk = "Warn"
pattern = '^php\s+-[a-zA-Z]*r\b'
description = "php -r — executes inline PHP code; dangerous behavior may be hidden inside the evaluated snippet"
safe_alt = "Write the code to a .php file and run it explicitly"
justification = "Inline PHP in -r arguments bypasses shell-level scanning. Malicious filesystem or network operations hidden inside PHP strings will not be caught by Aegis regex rules."

[[patterns]]
id = "EXEC-012"
category = "Process"
risk = "Warn"
pattern = '^lua\s+-e\b|^luajit\s+-e\b'
description = "lua -e / luajit -e — executes inline Lua code that can hide filesystem or process actions"
safe_alt = "Write the code to a .lua file and run it explicitly"
justification = "Inline Lua in -e arguments bypasses shell-level scanning. Malicious filesystem or network operations hidden inside Lua strings will not be caught by Aegis regex rules."

[[patterns]]
id = "EXEC-013"
category = "Process"
risk = "Warn"
pattern = '^python[23]?\s+-($|\s)'
description = "python - — executes Python read from stdin or a heredoc, which hides the final payload from a quick shell-level review"
safe_alt = "Write the code to a .py file, inspect it, then execute it explicitly"
justification = "Reading Python from stdin or a heredoc means the actual code is not visible in the command line. Aegis cannot scan the payload, making it easy to hide destructive operations."
