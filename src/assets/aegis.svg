<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <!-- ================= defs ================= -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c111b"/>
      <stop offset="1" stop-color="#080b12"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
  </defs>

  <rect width="900" height="480" fill="url(#bg)"/>

  <!-- ================= title ================= -->
  <text x="450" y="46" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif"
        font-size="22" font-weight="700" fill="#e6edf3">How <tspan fill="#38bdf8">Aegis</tspan> works</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif"
        font-size="13" fill="#8b98a8">A shell proxy that screens every command before it runs</text>

  <!-- ================= static skeleton ================= -->

  <!-- agent box -->
  <g>
    <rect x="40" y="186" width="150" height="92" rx="14" fill="#111927" stroke="#2a3344" stroke-width="1.5"/>
    <circle cx="62" cy="208" r="3.5" fill="#ef4444"/>
    <circle cx="74" cy="208" r="3.5" fill="#fbbf24"/>
    <circle cx="86" cy="208" r="3.5" fill="#34d399"/>
    <text x="115" y="246" text-anchor="middle" font-size="13" fill="#cbd5e1">AI&#160;agent</text>
    <text x="115" y="264" text-anchor="middle" font-size="11" fill="#64748b">$&#160;shell</text>
  </g>

  <!-- arrow agent -> aegis -->
  <line x1="190" y1="232" x2="318" y2="232" stroke="#33415a" stroke-width="2"/>
  <line x1="190" y1="232" x2="318" y2="232" stroke="#38bdf8" stroke-width="2"
        stroke-dasharray="6 10" stroke-linecap="round">
    <animate attributeName="stroke-dashoffset" values="0;-160" dur="2.4s" repeatCount="indefinite"/>
  </line>
  <path d="M318 232 l-9 -5 v10 z" fill="#38bdf8"/>

  <!-- aegis core -->
  <g>
    <rect x="322" y="150" width="206" height="172" rx="18" fill="#0f1726" stroke="#26405c" stroke-width="1.5"/>
    <!-- green/red status glow behind shield -->
    <circle id="glowGreen" cx="425" cy="206" r="40" fill="#10b981" filter="url(#glow)" opacity="0">
      <animate attributeName="opacity" keyTimes="0;0.22;0.30;0.44;0.46;1"
               values="0;0;0.85;0.85;0;0" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle id="glowRed" cx="425" cy="206" r="40" fill="#ef4444" filter="url(#glow)" opacity="0">
      <animate attributeName="opacity" keyTimes="0;0.64;0.66;0.70;0.74;0.78;0.90;0.92;1"
               values="0;0;0.9;0.5;0.9;0.5;0.9;0;0" dur="9s" repeatCount="indefinite"/>
    </circle>
    <!-- shield -->
    <path d="M425 168 l34 13 v22 c0 26 -16 44 -34 52 c-18 -8 -34 -26 -34 -52 v-22 z"
          fill="url(#shieldGrad)" stroke="#bae6fd" stroke-width="1.2"/>
    <path d="M413 205 l8 9 16 -19" fill="none" stroke="#0b1220" stroke-width="3.2"
          stroke-linecap="round" stroke-linejoin="round"/>
    <text x="425" y="278" text-anchor="middle" font-size="15" font-weight="700"
          letter-spacing="2" fill="#e6edf3">AEGIS</text>

    <!-- verdict line -->
    <text x="425" y="302" text-anchor="middle" font-size="12" fill="#64748b" opacity="1">
      <animate attributeName="opacity" keyTimes="0;0.20;0.46;0.62;1" values="1;0;1;0;1"
               dur="9s" repeatCount="indefinite"/>scan&#160;&amp;&#160;assess&#160;risk</text>
    <text x="425" y="302" text-anchor="middle" font-size="12" font-weight="700" fill="#34d399" opacity="0">
      <animate attributeName="opacity" keyTimes="0;0.22;0.44;0.46;1" values="0;1;1;0;0"
               dur="9s" repeatCount="indefinite"/>SAFE&#160;&#183;&#160;allow</text>
    <text x="425" y="302" text-anchor="middle" font-size="12" font-weight="700" fill="#f87171" opacity="0">
      <animate attributeName="opacity" keyTimes="0;0.64;0.90;0.92;1" values="0;1;1;0;0"
               dur="9s" repeatCount="indefinite"/>DANGER&#160;&#183;&#160;hold</text>
  </g>

  <!-- arrow aegis -> execute (safe path) -->
  <line x1="528" y1="232" x2="636" y2="232" stroke="#1f3a30" stroke-width="2"/>
  <line x1="528" y1="232" x2="636" y2="232" stroke="#34d399" stroke-width="2.5"
        stroke-dasharray="7 9" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" keyTimes="0;0.22;0.44;0.46;1" values="0;1;1;0;0" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="stroke-dashoffset" values="0;-160" dur="1.6s" repeatCount="indefinite"/>
  </line>
  <path d="M636 232 l-9 -5 v10 z" fill="#34d399" opacity="0.45">
    <animate attributeName="opacity" keyTimes="0;0.22;0.44;0.46;1" values="0.25;1;1;0.25;0.25" dur="9s" repeatCount="indefinite"/>
  </path>
  <text x="582" y="222" text-anchor="middle" font-size="10" fill="#34d399" opacity="0.7">pass</text>

  <!-- arrow aegis -> confirm (danger path) -->
  <path d="M425 322 v40" fill="none" stroke="#4a2230" stroke-width="2"/>
  <path d="M425 322 v40" fill="none" stroke="#f87171" stroke-width="2.5"
        stroke-dasharray="7 9" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" keyTimes="0;0.64;0.90;0.92;1" values="0;1;1;0;0" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="stroke-dashoffset" values="0;-160" dur="1.6s" repeatCount="indefinite"/>
  </path>
  <path d="M425 362 l-5 -9 h10 z" fill="#f87171" opacity="0.45">
    <animate attributeName="opacity" keyTimes="0;0.64;0.90;0.92;1" values="0.25;1;1;0.25;0.25" dur="9s" repeatCount="indefinite"/>
  </path>
  <text x="452" y="346" text-anchor="middle" font-size="10" fill="#f87171" opacity="0.7">block</text>

  <!-- execute box -->
  <g>
    <rect x="636" y="186" width="200" height="92" rx="14" fill="#111927" stroke="#234a3c" stroke-width="1.5"/>
    <rect id="exGlow" x="636" y="186" width="200" height="92" rx="14" fill="none" stroke="#34d399" stroke-width="2" opacity="0">
      <animate attributeName="opacity" keyTimes="0;0.30;0.44;0.46;1" values="0;1;1;0;0" dur="9s" repeatCount="indefinite"/>
    </rect>
    <text x="736" y="222" text-anchor="middle" font-size="13" fill="#cbd5e1">command runs</text>
    <text x="736" y="244" text-anchor="middle" font-size="11" fill="#64748b">untouched</text>
    <g opacity="0">
      <animate attributeName="opacity" keyTimes="0;0.31;0.44;0.46;1" values="0;1;1;0;0" dur="9s" repeatCount="indefinite"/>
      <rect x="688" y="252" width="96" height="20" rx="10" fill="#0c2a20" stroke="#34d399" stroke-width="1"/>
      <text x="736" y="266" text-anchor="middle" font-size="11" fill="#34d399">&lt; 2 ms</text>
    </g>
  </g>

  <!-- confirm box -->
  <g>
    <rect x="296" y="372" width="308" height="88" rx="14" fill="#15101a" stroke="#4a2230" stroke-width="1.5"/>
    <rect id="cfGlow" x="296" y="372" width="308" height="88" rx="14" fill="none" stroke="#f87171" stroke-width="2" opacity="0">
      <animate attributeName="opacity" keyTimes="0;0.70;0.90;0.92;1" values="0;1;1;0;0" dur="9s" repeatCount="indefinite"/>
    </rect>
    <g opacity="0">
      <animate attributeName="opacity" keyTimes="0;0.70;0.90;0.92;1" values="0;1;1;0;0" dur="9s" repeatCount="indefinite"/>
      <text x="316" y="402" font-size="12.5" fill="#fbbf24">&#9888; rm -rf /  will delete everything</text>
      <text x="316" y="430" font-size="13" fill="#cbd5e1">Run anyway?  [y/N]</text>
      <!-- blinking cursor -->
      <rect x="466" y="419" width="9" height="14" fill="#f87171">
        <animate attributeName="opacity" values="1;0;1;0;1;0;1" dur="1.1s" repeatCount="indefinite"/>
      </rect>
    </g>
    <!-- BLOCKED stamp -->
    <g opacity="0" transform="rotate(-8 540 430)">
      <animate attributeName="opacity" keyTimes="0;0.84;0.86;0.90;0.92;1" values="0;0;1;1;0;0" dur="9s" repeatCount="indefinite"/>
      <rect x="512" y="414" width="78" height="28" rx="5" fill="none" stroke="#f87171" stroke-width="2.5"/>
      <text x="551" y="433" text-anchor="middle" font-size="13" font-weight="800" letter-spacing="1" fill="#f87171">BLOCKED</text>
    </g>
  </g>

  <!-- ================= moving command pills ================= -->

  <!-- SAFE pill: agent -> aegis -> execute -->
  <g>
    <animate attributeName="opacity" keyTimes="0;0.03;0.05;0.42;0.45;1" values="0;0;1;1;0;0" dur="9s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate"
      keyTimes="0;0.06;0.20;0.28;0.42;1"
      values="115 232;115 232;425 232;425 232;736 232;736 232"
      calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0 0 1 1"
      dur="9s" repeatCount="indefinite"/>
    <rect x="-62" y="-17" width="124" height="34" rx="17" fill="#0b2620" stroke="#34d399" stroke-width="1.4"/>
    <text x="0" y="5" text-anchor="middle" font-size="13" fill="#a7f3d0">git&#160;push</text>
  </g>

  <!-- DANGER pill: agent -> aegis -> confirm -->
  <g>
    <animate attributeName="opacity" keyTimes="0;0.47;0.49;0.90;0.93;1" values="0;0;1;1;0;0" dur="9s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate"
      keyTimes="0;0.50;0.62;0.70;0.86;1"
      values="115 232;115 232;425 232;425 232;425 416;425 416"
      calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0 0 1 1"
      dur="9s" repeatCount="indefinite"/>
    <rect x="-58" y="-17" width="116" height="34" rx="17" fill="#2a0f15" stroke="#f87171" stroke-width="1.4"/>
    <text x="0" y="5" text-anchor="middle" font-size="13" fill="#fecaca">rm&#160;-rf&#160;/</text>
  </g>

</svg>
