[advisories]
# Deny crates with known security vulnerabilities
version = 2
ignore = []

[licenses]
version = 2
# Only allow permissive licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
]
# Confidence threshold for license detection
confidence-threshold = 0.8

[bans]
# Lint level for when multiple versions of the same crate are detected
multiple-versions = "warn"
# Banned crates — once_cell is superseded by std::sync::LazyLock (stable since Rust 1.80)
deny = [
    { name = "once_cell", reason = "superseded by std::sync::LazyLock (stable since Rust 1.80)" },
]

[sources]
# Only allow crates from crates.io
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
