#:schema https://developers.openai.com/codex/config-schema.json

# Aegis — Codex project baseline
# Codex rules for this repository live in:
# - .codex/AGENTS.md
# - .codex/agents/guardrails.md
# - .codex/agents/workflows/*.md

approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"

# Use project-local codex instructions.
model_instructions_file = "/home/iliasalmerekov/Projects/aegis/.codex/AGENTS.md"

[features]
multi_agent = true
# Enables Codex hook loading; Aegis installs hook registrations in ~/.codex/hooks.json.
codex_hooks = true

[profiles.strict]
approval_policy = "on-request"
sandbox_mode = "read-only"
web_search = "cached"

[profiles.yolo]
approval_policy = "never"
sandbox_mode = "workspace-write"
web_search = "live"

[agents]
max_threads = 6
max_depth = 1
