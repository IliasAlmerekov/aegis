#:schema https://developers.openai.com/codex/config-schema.json

# Aegis — Codex project baseline
# Codex rules for this repository live in:
# - AGENTS.md (repo root) — loaded via model_instructions_file below
# - CLAUDE.md (repo root) — shared conventions

approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"

# Use the repo-root Codex/agent instructions.
# Path is resolved relative to this config file's directory (.codex/), hence
# the "../" to reach the repository root.
model_instructions_file = "../AGENTS.md"

[features]
multi_agent = true
# Enables Codex hook loading; Aegis installs hook registrations in ~/.codex/hooks.json.
hooks = true

[agents]
max_threads = 6
max_depth = 1
