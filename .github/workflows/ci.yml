name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # main must always finish a full run (audit, deny, fuzz) — cancelling it
  # would let a commit land without ever going green, and would let the
  # weekly schedule/workflow_dispatch races kill an in-flight main push (or
  # vice versa). Only cancel superseded runs on non-main refs (feature
  # branches, PRs).
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_TOOLCHAIN: 1.94.0
  CARGO_AUDIT_VERSION: 0.22.1
  CARGO_DENY_VERSION: 0.19.0
  CROSS_VERSION: 0.2.5
  CARGO_FUZZ_VERSION: 0.13.1

jobs:
  # Single source of truth for the "is this worth a slow/expensive job"
  # gate, used by every heavy job below (macOS runners, fuzzing, live
  # network/Docker/SQLite integration tests, benchmark baselines). A
  # regression in any of them only needs to be caught before it lands on
  # main (via a PR targeting main), on the weekly schedule, or on a manual
  # run — not on every push to a feature branch.
  gate:
    name: Determine heavy-job gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      heavy: ${{ steps.compute.outputs.heavy }}
    steps:
      - name: Compute heavy-job gate
        id: compute
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event_name }}" == "workflow_dispatch" || ( "${{ github.event_name }}" == "pull_request" && "${{ github.event.pull_request.base.ref }}" == "main" ) ]]; then
            echo "heavy=true" >> "$GITHUB_OUTPUT"
          else
            echo "heavy=false" >> "$GITHUB_OUTPUT"
          fi

  quality:
    name: Quality (fmt, clippy, test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: ./.github/actions/setup-rust
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: cargo fmt --check
        run: cargo fmt --check --all

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: cargo test --workspace (includes architecture_boundaries)
        run: cargo test --workspace

  security:
    name: Security (audit, deny)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: ./.github/actions/setup-rust
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          cache-key-prefix: security-

      - name: Cache cargo security tools
        uses: actions/cache@a7833574556fa59680c1b7cb190c1735db73ebf0 # v5.0.0
        with:
          path: ~/.cargo-tools
          key: ${{ runner.os }}-cargo-tools-${{ env.CARGO_AUDIT_VERSION }}-${{ env.CARGO_DENY_VERSION }}

      - name: Add cached cargo tools to PATH
        run: echo "$HOME/.cargo-tools/bin" >> "$GITHUB_PATH"

      - name: Install cargo-audit if needed
        run: |
          if ! command -v cargo-audit >/dev/null 2>&1; then
            cargo install cargo-audit --root ~/.cargo-tools --version ${{ env.CARGO_AUDIT_VERSION }} --locked
          fi

      - name: cargo audit
        run: cargo audit

      - name: Install cargo-deny if needed
        run: |
          if ! command -v cargo-deny >/dev/null 2>&1; then
            cargo install cargo-deny --root ~/.cargo-tools --version ${{ env.CARGO_DENY_VERSION }} --locked
          fi

      - name: cargo deny check
        run: cargo deny check

  build:
    name: Release build (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: ./.github/actions/setup-rust
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          cache-key-prefix: release-

      - name: cargo build --release
        run: cargo build --release

  # macOS is expensive (10x Linux minutes on GitHub-hosted runners) — only
  # worth running where a regression would otherwise ship: PRs targeting
  # main (last chance to catch it before it merges), the weekly schedule,
  # and manual runs. Deliberately NOT re-run on push to main — the PR that
  # merged it already ran this job, so re-running on the merge commit is
  # redundant. Feature-branch pushes/PRs stay Linux-only; release.yml still
  # builds real macOS binaries for every tagged release regardless of this
  # gate.
  build-macos:
    name: Release build (macos-26)
    # Pinned rather than macos-latest (which migrated to macOS 26 on
    # 2026-06-15, see actions/runner-images#14167) so an OS bump never
    # silently lands under us — release.yml pins the same way for the
    # binaries it actually ships. Bump both together when moving on.
    runs-on: macos-26
    timeout-minutes: 20
    needs: gate
    if: needs.gate.outputs.heavy == 'true'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: ./.github/actions/setup-rust
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          cache-key-prefix: release-

      - name: cargo build --release
        run: cargo build --release

      - name: cargo test --workspace
        run: cargo test --workspace

  # ADR-022 §8 / Iteration 0 RED #2: the qualified grammar set must be
  # identical — and present — across the four official release targets. This
  # job compiles `aegis-language`'s *tests* for each target (`--tests`, not just
  # the crate): the test suite pulls in `grammar_smoke`, which references all
  # four foundation grammars, so a grammar that fails to link on a target is
  # caught here. It compiles tests rather than the release binary because the
  # shipping binary does not depend on the language crate yet (runtime wiring
  # lands in Iteration 3+); once it does, this job should build the full release
  # binary for each target. Cross targets (musl) cannot *execute* the tests, so
  # this proves link-presence on all four targets; runtime parse-presence stays
  # host-only (proven by `grammar_smoke` in the quality job). Same heavy-job
  # gate as build-macos: macOS runners and cross toolchains are expensive, so
  # this only runs on PRs targeting main, the weekly schedule, and manual runs.
  # The cross approach mirrors release.yml (`cross` for musl, native `cargo
  # build` on Intel/ARM macOS).
  cross-matrix:
    name: Cross build (${{ matrix.target }})
    needs: gate
    if: needs.gate.outputs.heavy == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          # Pinned rather than macos-latest so a runner-image bump never
          # silently changes what a release is built on (see release.yml).
          - target: x86_64-apple-darwin
            os: macos-26-intel
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-26
            use_cross: false
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: ./.github/actions/setup-rust
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}
          cache-key-prefix: cross-${{ matrix.target }}-

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --version ${{ env.CROSS_VERSION }} --locked

      - name: Cross build aegis-language tests (musl, link-presence)
        if: matrix.use_cross
        run: cross build --tests --target ${{ matrix.target }} -p aegis-language

      - name: Native build aegis-language tests (macOS, link-presence)
        if: "!matrix.use_cross"
        run: cargo build --tests --target ${{ matrix.target }} -p aegis-language

  # Heavy/slow job (bench + criterion). Full-fidelity run is only needed
  # before it lands on main or on the weekly schedule — same gate as
  # build-macos above.
  performance:
    name: Performance baseline (scanner bench)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: gate
    if: needs.gate.outputs.heavy == 'true'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: ./.github/actions/setup-rust
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          cache-key-prefix: perf-

      - name: cargo bench --bench scanner_bench
        run: cargo bench --bench scanner_bench

      # ADR-022 Iteration 0 RED #3: a no-source command must not start the
      # language worker or perform filesystem metadata calls. The bench asserts
      # Outcome::NotStarted inside its iteration body, so a regression that
      # makes a no-source command start the worker panics and fails this job.
      # The contract is also pinned by a fast `tests/no_source.rs` test in the
      # quality job; this harness keeps the no-source path on the perf wall.
      - name: cargo bench --bench no_source_bench -p aegis-language
        run: cargo bench --bench no_source_bench -p aegis-language

      # ADR-022 Iteration 0 GREEN measurement: parse latency per foundation
      # grammar. A measurement (not asserting) bench — parses one
      # representative inline-source snippet per grammar so the recorded latency
      # reflects the slow-path cost an inline interpreter target would pay.
      - name: cargo bench --bench parse_latency_bench -p aegis-language
        run: cargo bench --bench parse_latency_bench -p aegis-language

      - name: Evaluate benchmark policy
        run: |
          cargo run --quiet --bin aegis_benchcheck -- \
            --baseline perf/scanner_bench_baseline.toml \
            --criterion-root target/criterion | tee benchmark-report.txt

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: scanner-bench-artifacts
          path: |
            benchmark-report.txt
            target/criterion

  # Hits the real GitHub Releases API — only worth the network flakiness
  # risk and runtime before it lands on main or on the weekly schedule.
  live-installer:
    name: Live installer validation (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: gate
    if: needs.gate.outputs.heavy == 'true'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: ./.github/actions/setup-rust
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          cache-key-prefix: live-installer-

      - name: Run live installer test
        run: AEGIS_TEST_LIVE_INSTALL=1 cargo test --test installer_live_release test_installer_live_github_release_download

  # Same cost/coverage tradeoff as build-macos above.
  live-installer-macos:
    name: Live installer validation (macos-26)
    # Pinned rather than macos-latest — see build-macos above.
    runs-on: macos-26
    timeout-minutes: 15
    needs: gate
    if: needs.gate.outputs.heavy == 'true'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: ./.github/actions/setup-rust
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          cache-key-prefix: live-installer-

      - name: Run live installer test
        run: AEGIS_TEST_LIVE_INSTALL=1 cargo test --test installer_live_release test_installer_live_github_release_download

  # Spins up real Docker + SQLite fixtures — same cost/coverage tradeoff as
  # build-macos above.
  snapshot-rollback-live:
    name: Live snapshot/rollback (Docker + SQLite)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: gate
    if: needs.gate.outputs.heavy == 'true'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: ./.github/actions/setup-rust
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          cache-key-prefix: snapshot-rollback-

      - name: Install SQLite CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3

      - name: Pull Docker fixture image
        run: docker pull alpine

      - name: Run live Docker snapshot rollback test
        env:
          AEGIS_DOCKER_TESTS: "1"
        run: cargo test --test docker_integration snapshot_rollback_reverts_filesystem_change -- --exact --nocapture

      - name: Run live SQLite snapshot rollback test
        env:
          AEGIS_SQLITE_SNAPSHOT_TESTS: "1"
        run: cargo test --test snapshot_rollback_live sqlite_snapshot_rollback_restores_database_file_through_aegis_cli -- --exact --nocapture

  # 300k total fuzz iterations across three targets — the most expensive
  # Linux job in this workflow. Same cost/coverage tradeoff as build-macos
  # above: a regression here only needs to be caught before main or weekly.
  fuzz:
    name: Fuzzing (parser + scanner + heredoc)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: gate
    if: needs.gate.outputs.heavy == 'true'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: ./.github/actions/setup-rust
        with:
          toolchain: nightly
          cache-key-prefix: fuzz-

      - name: Cache cargo-fuzz binary
        uses: actions/cache@a7833574556fa59680c1b7cb190c1735db73ebf0 # v5.0.0
        with:
          path: ~/.cargo-tools
          key: ${{ runner.os }}-cargo-tools-cargo-fuzz-${{ env.CARGO_FUZZ_VERSION }}

      - name: Add cached cargo tools to PATH
        run: echo "$HOME/.cargo-tools/bin" >> "$GITHUB_PATH"

      - name: Install cargo-fuzz if needed
        run: |
          if ! command -v cargo-fuzz >/dev/null 2>&1; then
            # No --locked: cargo-fuzz's published Cargo.lock pins rustix 0.36.5,
            # which fails to build on current nightly (rustc_attrs got stricter).
            # Letting cargo re-resolve deps picks up a compatible rustix instead.
            cargo install cargo-fuzz --root ~/.cargo-tools --version ${{ env.CARGO_FUZZ_VERSION }}
          fi

      - name: Run parser fuzz
        run: LSAN_OPTIONS=detect_leaks=0 cargo +nightly fuzz run parser fuzz/corpus/parser -- -runs=100000 -max_len=65536

      - name: Run scanner fuzz
        run: LSAN_OPTIONS=detect_leaks=0 cargo +nightly fuzz run scanner fuzz/corpus/scanner -- -runs=100000 -max_len=65536

      - name: Run heredoc fuzz
        run: LSAN_OPTIONS=detect_leaks=0 cargo +nightly fuzz run heredoc fuzz/corpus/heredoc -- -runs=100000 -max_len=65536
