name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_TOOLCHAIN: 1.94.0
  CROSS_VERSION: 0.2.5

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            asset_name: aegis-linux-x86_64
            use_cross: true

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            asset_name: aegis-linux-aarch64
            use_cross: true

          - target: x86_64-apple-darwin
            os: macos-15-intel
            asset_name: aegis-macos-x86_64

          - target: aarch64-apple-darwin
            os: macos-15
            asset_name: aegis-macos-aarch64

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (Add 1.94.1 patch release)
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@a7833574556fa59680c1b7cb190c1735db73ebf0 # v5.0.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --version ${{ env.CROSS_VERSION }} --locked

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/aegis ${{ matrix.asset_name }}
          chmod 0755 ${{ matrix.asset_name }}

      - name: Verify static Linux binary
        if: contains(matrix.target, 'unknown-linux-musl')
        shell: bash
        run: |
          asset="${{ matrix.asset_name }}"
          file "$asset"
          # Inspect the ELF headers directly instead of running ldd. ldd executes
          # the binary's loader, which is unreliable for cross-compiled foreign
          # architectures and misreports static-pie binaries. A truly static
          # binary has no dynamic interpreter (PT_INTERP) and no shared library
          # dependencies (DT_NEEDED) — this holds for both classic "statically
          # linked" and musl "static-pie linked" outputs.
          if readelf -l "$asset" | grep -qw INTERP; then
            echo "expected static binary, but found a dynamic interpreter (PT_INTERP)" >&2
            readelf -l "$asset" >&2
            exit 1
          fi
          if readelf -d "$asset" 2>/dev/null | grep -qw NEEDED; then
            echo "expected static binary, but found shared library dependencies (DT_NEEDED)" >&2
            readelf -d "$asset" >&2
            exit 1
          fi
          echo "OK: $asset is statically linked (no PT_INTERP, no DT_NEEDED)"

      - name: Generate SHA256 checksum
        shell: bash
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256
          else
            shasum -a 256 ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ matrix.asset_name }}
            ${{ matrix.asset_name }}.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Download all artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          name: Aegis ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
          files: |
            artifacts/aegis-linux-x86_64
            artifacts/aegis-linux-x86_64.sha256
            artifacts/aegis-linux-aarch64
            artifacts/aegis-linux-aarch64.sha256
            artifacts/aegis-macos-x86_64
            artifacts/aegis-macos-x86_64.sha256
            artifacts/aegis-macos-aarch64
            artifacts/aegis-macos-aarch64.sha256

  publish-npm:
    name: Publish npm package
    needs: release
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-alpha') }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (Add 1.94.1 patch release)
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Generate npm checksums from release assets
        env:
          AEGIS_RELEASE_REPO: ${{ github.repository }}
        run: scripts/update-npm-package.sh "${{ github.ref_name }}"

      - name: Verify npm package contract
        run: cargo test --test npm_package

      - name: Verify npm package contents
        working-directory: packaging/npm
        env:
          AEGIS_NPM_SKIP_DOWNLOAD: "1"
        run: npm pack --dry-run

      - name: Configure npm authentication
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret is required to publish @iliasalmerekov/aegis" >&2
            exit 1
          fi
          printf '//registry.npmjs.org/:_authToken=%s\n' "$NODE_AUTH_TOKEN" > "$HOME/.npmrc"

      - name: Publish npm package
        working-directory: packaging/npm
        run: npm publish --access public
